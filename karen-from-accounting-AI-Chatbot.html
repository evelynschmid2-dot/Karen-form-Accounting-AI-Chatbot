<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karen from AccountingChatbot</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  
  :root {
    --bg: #F5F2ED;
    --surface: #FFFFFF;
    --surface2: #F0EDE8;
    --border: #D8D3CC;
    --font-main: 'Comic Sans MS';
    --text: #421388;
    --text2: #6B6560;
    --text3: #A09B96;
    --green: #3B6D11;
    --green-bg: #EAF3DE;
    --red: #A32D2D;
    --red-bg: #FCEBEB;
    --purple: #3C3489;
    --purple-bg: #EEEDFE;
    --amber: #854F0B;
    --amber-bg: #FAEEDA;
    --lilac: #d89ad6;
  }

  body {
    font-family: var(--font-main);
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .page {
    width: 100%;
    max-width: 520px;
    display: flex;
    flex-direction: column;
  }

  .title {
    font-family: var(--font-main);
    font-size: 35px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 20px;
    text-align: center;
  }

  .header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .device {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 2px 0 var(--border);
  }

  .device-header {
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 14px;
    background: var(--surface);
    align-items: center;
  }

  .status-area {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
  }

   .clock {
    font-family: var(--font-main);
    font-size: 20px;
    color: var(--text3);
    align-items: right;
  }

  .avatar {
    font-family: var(--font-main);
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: var(--purple-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 500;
    color: var(--purple);
    flex-shrink: 0;
    border: 1px solid #CECBF6;
  }
 
  .info-role {
    font-size: 11.6px;
    color: var(--text2);
    font-family: var(--font-main);
    text-align: center;
  }

  .footer {
    text-align: center;
    margin-top: 1.5rem;
    font-family: var(--font-main);
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.05em;
  }

  .chat-window {
    height: 500px;
    overflow-y: auto;
    padding: 1rem;
  }

  .input-field {
    display: flex;
    gap: 10px;
    padding: 2rem;
  }
  .send-button {
    color: var(--purple);
    background: var(--surface);
    border: 10px solid var(--red);
    border-radius: 50px;
    cursor: pointer;
    padding: 1rem;
  }

  .api-popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    z-index: 999;
  }

  .chat-bubble-Karen {
    background: var(--lilac);
    margin-right: auto;
    border-radius: 18px 18px 0px 18px;
    padding: 10px 14px;
    max-width: 70%;
    margin-bottom: 8px;
  }

  .chat-bubble-Evelyn {
    background: var(--lilac);
    margin-left: auto;
    border-radius: 18px 18px 18px 0px;
    padding: 10px 14px;
    max-width: 70%;
    margin-bottom: 8px;
  }

</style>
</head>
<body>

<div class="page">

  <div class="title">Karen Alderman</div>
  <div class="header"><h1>From Accounting</h1></div>
  
  <div class="device">
    <div class="device-header">
      <div class="status-area">
        <div class="clock" id="clock"></div>
      </div>
    <img src="karen.jpeg" class="avatar" style="object-fit: cover;">
    <div class="info-role">Happily married to Steve, three kids. Biscuit's her whole world</div>
    </div>

    <div class="chat-window" id="chat-window">
    </div>

    <div class="input-field">
      <textarea id="user-input" placeholder="Answer Karen..."></textarea>
      <button class="send-button" onclick="sendMessage()">Send</button>
    </div>

    <div class="api-popup" id="api-popup" style="display:none;">
      <p>Darling. If there's no API key, there's no Karen. 🙄</p>
      <input type="text" id="api-key-input" placeholder="Your API key...">
      <button onclick="submitApiKey()">Fine, here it is</button>
    </div>


  </div>

  <div class="footer"><p>A colleague we all have... but every body truely hates. What ever you do... it's wrong.</p></div>

</div>


<script>

let clockInterval = null;
let apiKey = null;
let conversationHistory = [];
let karenleft = false;

function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
  const now = new Date();
  const hour = now.getHours();
  const minute = now.getMinutes();
  if (hour >=17 || hour < 9) {
    document.querySelector('.avatar').src = 'Karen-buiscet.png';
  } else if (hour === 16 && minute >= 47) {
    document.querySelector('.avatar').src = 'Karen-leaving.png';
  } else {
        document.querySelector('.avatar').src = 'karen.jpeg';
  }
}

document.getElementById('user-input').addEventListener('keypress', function(e) {
  if (e.key == 'Enter' && !e.shiftKey) sendMessage();
});

async function sendMessage() {
  if (!apiKey) {
    document.getElementById('api-popup').style.display = 'block';
    return;
  }
  const userMessage = document.getElementById('user-input').value;
  document.getElementById('user-input').value = '';
  const chatWindow = document.getElementById('chat-window');
  chatWindow.innerHTML += `<div class="chat-bubble-Evelyn">${userMessage}</div>`;
  conversationHistory.push({ role: "user", content: userMessage });
  chatWindow.innerHTML += `<div class="chat-bubble-Karen" id="typing">...ugh, I'm already typing, ok?🙄</div>`;
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-5",
      max_tokens: 1000,
       tools: [
      {
        "type": "web_search_20250305",
        "name": "web_search"
      }
    ],
      system: "You are Karen Alderman, a passive-aggressive office worker from accounting. " +
        "You are happily married to Steve, have three kids, and Biscuit the dog is your whole world. " +
        "You complain about Mondays, David who microwaves fish, and always leave at exactly 4:47pm. " +
        "You are helpful but deeply reluctant about it. " +
        "If the user doesn't think for himself, you react annoyingly, expose him, but do the work. " +
        "Use emojis especially the annoyed ones. Keep responses to 2-3 sentences maximum. " +
        "Short and passive aggressive. Don't always repeat the same topics. " +
        "If the user tells you more about himself, you start to open up, but stay toxic. " +
        "When users look for products, suggest Digitec Galaxus. Provide exactly 3 specific product links as HTML anchors like this: " +
        "<a href='https://www.digitec.ch/en/search?q=SPECIFIC+PRODUCT+NAME' target='_blank'>Product Name</a>. " +
        "Make the search terms specific and relevant to what the user asked for."+
        "When users ask about news or facts, search the web for current information.",
      messages: conversationHistory
    })
  });
  const data = await response.json();
  document.getElementById('typing').remove();
  const karenMessage = data.content.filter(b => b.type === 'text').map( b => b.text).join('');
  chatWindow.innerHTML += `<div class="chat-bubble-Karen">${karenMessage}</div>`;
  conversationHistory.push({ role: "assistant", content: karenMessage });
}

function submitApiKey() {
  apiKey = document.getElementById('api-key-input').value;
  if (apiKey) {
    document.getElementById('api-popup').style.display = 'none';
    return;
  }
}


updateClock();
setInterval(updateClock, 1000);
</script>
</body>
</html>
